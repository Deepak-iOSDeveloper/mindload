{% extends 'base.html' %}
{% block title %}Login — MindLoad{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 120px);display:flex;align-items:center;justify-content:center;padding:2rem">
    <div style="width:100%;max-width:400px">
        <div style="text-align:center;margin-bottom:2rem">
            <div style="font-size:2.5rem;margin-bottom:0.75rem">🧠</div>
            <h1 style="font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;margin-bottom:0.5rem">Welcome back</h1>
            <p style="color:var(--text2);font-size:0.875rem">Sign in to track your mental load</p>
        </div>
        <div class="card">
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-input" placeholder="Your username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Your password" required>
                </div>
                {% if form.errors %}
                <div class="alert alert-error">Invalid username or password. Please try again.</div>
                {% endif %}
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem">Sign In →</button>
            </form>
            <div style="text-align:center;margin-top:1.25rem;font-size:0.875rem;color:var(--text2)">
                Don't have an account? <a href="{% url 'register' %}" style="color:var(--accent);font-weight:600">Create one free</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
